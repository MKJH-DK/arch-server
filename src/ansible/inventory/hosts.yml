---
all:
  hosts:
    localhost:
      ansible_connection: local
      ansible_python_interpreter: /usr/bin/python3
  vars:
    # User configuration
    admin_user: admin
    webserver_user: root

    # Email for Let's Encrypt certificates (shared across all domains)
    domain_email: "{{ lookup('env', 'DOMAIN_EMAIL') | default('', true) }}"

    # Domains - list of sites to serve with automatic HTTPS
    # Each entry needs at minimum: { domain: "example.com" }
    # Optional: root (default: /srv/www)
    #
    # Configure via:
    #   1. DOMAIN env var (single domain, backward compatible)
    #   2. Override in playbook extra-vars for multiple domains
    #   3. Edit this file directly
    #
    # Examples:
    #   Single:   domains: [{ domain: "example.com" }]
    #   Multiple: domains:
    #               - { domain: "example.com", root: "/srv/www" }
    #               - { domain: "blog.example.com", root: "/srv/blog" }
    #
    # Empty list = HTTP-only on :80 (no HTTPS, no domain)
    domains: []

    # Feature flags
    cloudflare_enabled: true
    monitoring_enabled: true

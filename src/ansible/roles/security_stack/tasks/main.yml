---
# Security Stack for Arch Linux v5.1
# Nftables + AppArmor + Auditd

# ============================================
# NFTABLES FIREWALL
# ============================================

- name: Install nftables
  community.general.pacman:
    name: nftables
    state: present

- name: Deploy main nftables configuration
  copy:
    dest: /etc/nftables.conf
    mode: '0644'
    content: |
      #!/usr/sbin/nft -f
      flush ruleset
      
      table inet filter {
        # Cloudflare IP sets
        set cloudflare_ipv4 {
          type ipv4_addr
          flags interval
          elements = { 173.245.48.0/20, 103.21.244.0/22, 103.22.200.0/22, 103.31.4.0/22, 141.101.64.0/18, 108.162.192.0/18, 190.93.240.0/20, 188.114.96.0/20, 197.234.240.0/22, 198.41.128.0/17, 162.158.0.0/15, 104.16.0.0/13, 104.24.0.0/14, 172.64.0.0/13, 131.0.72.0/22 }
        }
        
        set cloudflare_ipv6 {
          type ipv6_addr
          flags interval
          elements = { 2400:cb00::/32, 2606:4700::/32, 2803:f800::/32, 2405:b500::/32, 2405:8100::/32, 2a06:98c0::/29, 2c0f:f248::/32 }
        }
        
        # Rate limiting sets
        set rate_limit_ssh {
          type ipv4_addr
          flags timeout
        }
        
        set blacklist {
          type ipv4_addr
          flags timeout
        }
        
        chain input {
          type filter hook input priority 0; policy drop;
          
          # Accept established connections
          ct state established,related accept
          ct state invalid drop
          
          # Accept loopback
          iifname "lo" accept
          
          # Drop blacklisted IPs
          ip saddr @blacklist drop
          
          # Rate limited SSH
          ip saddr @rate_limit_ssh drop
          
          # ICMP (rate limited)
          ip protocol icmp icmp type { echo-request, destination-unreachable, time-exceeded } limit rate 10/second accept
          ip6 nexthdr icmpv6 icmpv6 type { echo-request, echo-reply, nd-neighbor-solicit, nd-neighbor-advert, nd-router-solicit, nd-router-advert } limit rate 10/second accept
          
          # SSH (rate limited - 3 new connections per minute per IP)
          tcp dport 22 ct state new limit rate 3/minute accept
          tcp dport 22 ct state new add @rate_limit_ssh { ip saddr timeout 10m } drop
          
          # Web traffic - allow from Cloudflare IPs
          tcp dport { 80, 443 } ip saddr @cloudflare_ipv4 accept
          tcp dport { 80, 443 } ip6 saddr @cloudflare_ipv6 accept
          udp dport 443 ip saddr @cloudflare_ipv4 accept
          udp dport 443 ip6 saddr @cloudflare_ipv6 accept
          
          # Also allow direct web access for testing (remove after tunnel setup)
          tcp dport { 80, 443 } accept
          
          # Container networking
          iifname "podman*" accept
          iifname "cni-*" accept
          
          # Log dropped packets (rate limited)
          limit rate 5/minute log prefix "nftables-drop: " level info
        }
        
        chain forward {
          type filter hook forward priority 0; policy drop;
          
          # Allow container traffic
          ct state established,related accept
          iifname "podman*" accept
          oifname "podman*" accept
        }
        
        chain output {
          type filter hook output priority 0; policy accept;

          # Egress monitoring (Tier 2) - log unexpected outbound traffic
          # Policy stays 'accept' for safety; set nftables_egress_enforce=true to block
          oif lo accept
          ct state established,related accept

          # Allow essential outbound: DoT, NTP, HTTP/HTTPS, QUIC
          ip daddr { 1.1.1.1, 1.0.0.1, 9.9.9.9, 149.112.112.112 } tcp dport 853 accept
          tcp dport { 80, 443 } accept
          udp dport { 123, 443 } accept

          # Log everything else (rate-limited to avoid log spam)
          limit rate 10/minute log prefix "[nftables] Egress: " level info
        }
      }
  notify: Restart nftables

- name: Ensure nftables directory exists
  file:
    path: /etc/nftables.d
    state: directory
    mode: '0755'

- name: Force handlers to run now
  meta: flush_handlers

- name: Enable and start nftables
  systemd:
    name: nftables
    enabled: yes
    state: started
    daemon_reload: yes
  register: nftables_start

- name: Wait for nftables to initialize
  pause:
    seconds: 2

- name: Force nftables rules load
  command: nft -f /etc/nftables.conf
  register: nftables_load
  failed_when: false
  changed_when: false

- name: Verify nftables rules are loaded
  shell: nft list ruleset 2>/dev/null | grep -q "table"
  register: nftables_rules
  changed_when: false
  failed_when: false

- name: Get nftables failure reason if rules not loaded
  command: journalctl -u nftables --no-pager -n 10
  register: nftables_journal
  changed_when: false
  failed_when: false
  when: nftables_rules.rc != 0

- name: Test nftables config syntax
  command: nft -c -f /etc/nftables.conf
  register: nftables_syntax
  changed_when: false
  failed_when: false
  when: nftables_rules.rc != 0

- name: Debug nftables failure
  debug:
    msg:
      - "nftables rules loaded: {{ 'YES' if nftables_rules.rc == 0 else 'NO' }}"
      - "Config syntax check: {{ 'OK' if nftables_syntax.rc == 0 else nftables_syntax.stderr | default('failed') }}"
      - "Load command: {{ 'OK' if nftables_load.rc == 0 else nftables_load.stderr | default('failed') }}"
      - "Journal: {{ nftables_journal.stdout_lines | default(['no logs']) }}"
  when: nftables_rules.rc != 0

- name: Try to restart nftables service if rules not loaded
  systemd:
    name: nftables
    state: restarted
  register: nftables_restart
  failed_when: false
  when: nftables_rules.rc != 0

- name: Wait after restart
  pause:
    seconds: 3
  when: nftables_rules.rc != 0

- name: Final nftables rules check
  shell: nft list ruleset 2>/dev/null | grep -q "table"
  register: nftables_final
  changed_when: false
  failed_when: false

- name: Report nftables status
  debug:
    msg: "{{ '✓ nftables firewall rules LOADED' if nftables_final.rc == 0 else '⚠ nftables rules not loaded - check config/logs' }}"

# ============================================
# APPARMOR
# ============================================

- name: Install AppArmor
  community.general.pacman:
    name: apparmor
    state: present

- name: Configure AppArmor kernel parameters
  lineinfile:
    path: /etc/kernel/cmdline
    line: "lsm=landlock,lockdown,yama,integrity,apparmor,bpf"
    regexp: "^lsm="
    create: yes
    mode: '0644'
  register: kernel_cmdline_changed

- name: Regenerate UKI after kernel cmdline change
  command: mkinitcpio -P
  when: kernel_cmdline_changed.changed

- name: Enable AppArmor service
  systemd:
    name: apparmor
    enabled: yes
    state: started
  failed_when: false

- name: Notify reboot required for AppArmor
  debug:
    msg: "REBOOT REQUIRED: AppArmor kernel parameters have been set. Run 'reboot' to activate AppArmor."
  when: kernel_cmdline_changed.changed

# ============================================
# AUDITD
# ============================================

- name: Install auditd
  community.general.pacman:
    name: audit
    state: present

- name: Deploy expanded CIS/STIG audit rules (Tier 1)
  copy:
    dest: /etc/audit/rules.d/hardening.rules
    mode: '0640'
    content: |
      # CIS/STIG-aligned audit rules - Arch Server v5.2
      # Maps to MITRE ATT&CK techniques where noted
      # Delete all existing rules
      -D

      # Buffer size (16384 handles bursts from package updates)
      -b 16384

      # Failure mode: 1=log (use 2=panic only on classified systems)
      -f 1

      # ── Identity & authentication ─────────────────────────────
      -w /etc/passwd -p wa -k identity
      -w /etc/group -p wa -k identity
      -w /etc/shadow -p wa -k identity
      -w /etc/gshadow -p wa -k identity
      -w /etc/security/opasswd -p wa -k identity

      # Sudoers / privilege config
      -w /etc/sudoers -p wa -k sudo_config
      -w /etc/sudoers.d/ -p wa -k sudo_config

      # PAM (T1556.003)
      -w /etc/pam.d/ -p wa -k pam
      -w /etc/security/ -p wa -k pam

      # ── Network & SSH ─────────────────────────────────────────
      -w /etc/hosts -p wa -k network
      -w /etc/hostname -p wa -k network
      -w /etc/NetworkManager/ -p wa -k network
      -w /etc/systemd/resolved.conf -p wa -k network
      -w /etc/systemd/resolved.conf.d/ -p wa -k network
      -w /etc/ssh/sshd_config -p wa -k sshd
      -w /etc/ssh/sshd_config.d/ -p wa -k sshd

      # ── Privilege escalation (T1548) ──────────────────────────
      -w /usr/bin/sudo -p x -k sudo_usage
      -w /usr/bin/su -p x -k su_usage
      -w /usr/bin/newgrp -p x -k privilege_escalation
      -w /usr/bin/chsh -p x -k privilege_escalation
      -w /usr/bin/chfn -p x -k privilege_escalation

      # setuid/setgid execution (uid != euid → privilege transition)
      -a always,exit -F arch=b64 -S execve -C uid!=euid -F euid=0 -k setuid_exec
      -a always,exit -F arch=b32 -S execve -C uid!=euid -F euid=0 -k setuid_exec

      # ── Kernel modules (T1547, T1215) ─────────────────────────
      -w /sbin/insmod -p x -k modules
      -w /sbin/rmmod -p x -k modules
      -w /sbin/modprobe -p x -k modules
      -w /sbin/modinfo -p x -k modules
      -a always,exit -F arch=b64 -S init_module,finit_module,delete_module -k modules

      # ── Boot & init integrity (T1542) ─────────────────────────
      -w /boot/ -p wa -k boot
      -w /etc/kernel/ -p wa -k boot
      -w /etc/mkinitcpio.conf -p wa -k boot
      -w /etc/mkinitcpio.conf.d/ -p wa -k boot

      # ── Firewall & network config ─────────────────────────────
      -w /etc/nftables.conf -p wa -k firewall
      -w /etc/nftables.d/ -p wa -k firewall

      # ── Living-Off-The-Land binaries (T1059, T1105) ───────────
      # Flags use of common exfiltration/download tools
      -w /usr/bin/curl -p x -k lotl
      -w /usr/bin/wget -p x -k lotl
      -w /usr/bin/nc -p x -k lotl
      -w /usr/bin/ncat -p x -k lotl
      -w /usr/bin/socat -p x -k lotl
      -w /usr/bin/python3 -p x -k lotl
      -w /usr/bin/python -p x -k lotl
      -w /usr/bin/perl -p x -k lotl
      -w /usr/bin/ruby -p x -k lotl
      -w /usr/bin/base64 -p x -k lotl
      -w /usr/bin/xxd -p x -k lotl
      -w /usr/bin/openssl -p x -k lotl

      # Shell spawns (T1059.004)
      -w /usr/bin/bash -p x -k shell
      -w /usr/bin/sh -p x -k shell
      -w /usr/bin/dash -p x -k shell
      -w /usr/bin/zsh -p x -k shell

      # ── File permission changes (T1222) ───────────────────────
      -a always,exit -F arch=b64 -S chmod,fchmod,fchmodat -F auid>=1000 -F auid!=-1 -k file_perm
      -a always,exit -F arch=b64 -S chown,fchown,lchown,fchownat -F auid>=1000 -F auid!=-1 -k file_own
      -a always,exit -F arch=b64 -S setxattr,lsetxattr,fsetxattr,removexattr,lremovexattr,fremovexattr -F auid>=1000 -k xattr

      # ── systemd unit tampering (T1543.002) ────────────────────
      -w /etc/systemd/system/ -p wa -k systemd_units
      -w /usr/lib/systemd/system/ -p wa -k systemd_units

      # ── Container runtime (T1610) ─────────────────────────────
      -w /usr/bin/podman -p x -k containers
      -w /etc/containers/ -p wa -k containers

      # ── Immutable: requires reboot to modify rules ─────────────
      -e 2

- name: Enable auditd
  systemd:
    name: auditd
    enabled: yes
    state: started

# ============================================
# AIDE FILE INTEGRITY MONITORING (Tier 2)
# ============================================

- name: Install AIDE
  community.general.pacman:
    name: aide
    state: present

- name: Deploy AIDE configuration
  copy:
    dest: /etc/aide.conf
    mode: '0640'
    content: |
      # AIDE configuration - Arch Server v5.2
      # Database stored at /var/lib/aide/aide.db.gz
      # IMPORTANT: after init, move database to read-only media or Btrfs read-only snapshot

      database_in=file:/var/lib/aide/aide.db.gz
      database_out=file:/var/lib/aide/aide.db.new.gz
      database_new=file:/var/lib/aide/aide.db.new.gz
      gzip_dbout=yes

      # Report options
      report_url=stdout
      report_url=file:/var/log/aide/aide.log
      verbose=5

      # ── Ruleset definitions ───────────────────────────────────
      # Full check: hash + permissions + ownership + timestamps
      FULL = p+i+n+u+g+s+m+c+sha256+sha512

      # Content only (for frequently-changing config dirs)
      CONTENT = sha256+sha512

      # Executables: strict - any change is critical
      EXEC = p+i+n+u+g+s+sha256+sha512

      # ── Monitored paths ───────────────────────────────────────
      # Boot and kernel
      /boot FULL
      /etc/kernel FULL
      /etc/mkinitcpio.conf FULL
      /etc/mkinitcpio.conf.d FULL

      # System binaries and libraries
      /usr/bin EXEC
      /usr/sbin EXEC
      /usr/lib FULL
      /usr/lib64 FULL

      # Security-critical config
      /etc/ssh FULL
      /etc/pam.d FULL
      /etc/security FULL
      /etc/sudoers FULL
      /etc/sudoers.d FULL
      /etc/audit FULL
      /etc/apparmor.d FULL
      /etc/nftables.conf FULL
      /etc/nftables.d FULL
      /etc/systemd/system FULL
      /etc/systemd/resolved.conf.d FULL
      /etc/containers FULL

      # User and group databases
      /etc/passwd FULL
      /etc/group FULL
      /etc/shadow FULL
      /etc/gshadow FULL

      # ── Excluded paths ────────────────────────────────────────
      # Logs and caches change constantly
      !/var/log
      !/var/cache
      !/var/tmp
      !/tmp
      !/proc
      !/sys
      !/dev
      !/run
      # Snapper snapshot dirs (Btrfs, not real files)
      !/.snapshots

- name: Create AIDE log directory
  file:
    path: /var/log/aide
    state: directory
    mode: '0700'
    owner: root
    group: root

- name: Create AIDE database directory
  file:
    path: /var/lib/aide
    state: directory
    mode: '0700'
    owner: root
    group: root

- name: Check if AIDE database exists
  stat:
    path: /var/lib/aide/aide.db.gz
  register: aide_db

- name: Initialize AIDE database (first run only)
  command: aide --init
  when: not aide_db.stat.exists
  register: aide_init
  failed_when: false

- name: Activate AIDE database after init
  command: mv /var/lib/aide/aide.db.new.gz /var/lib/aide/aide.db.gz
  when:
    - not aide_db.stat.exists
    - aide_init.rc is defined
    - aide_init.rc == 0

- name: Deploy AIDE check systemd service
  copy:
    dest: /etc/systemd/system/aide-check.service
    mode: '0644'
    content: |
      [Unit]
      Description=AIDE File Integrity Check
      After=local-fs.target

      [Service]
      Type=oneshot
      ExecStart=/usr/bin/aide --check
      StandardOutput=journal
      StandardError=journal
      # Run as root (needs access to shadow, boot, etc.)

- name: Deploy AIDE check systemd timer (daily)
  copy:
    dest: /etc/systemd/system/aide-check.timer
    mode: '0644'
    content: |
      [Unit]
      Description=Daily AIDE File Integrity Check

      [Timer]
      OnCalendar=daily
      Persistent=true
      RandomizedDelaySec=30min

      [Install]
      WantedBy=timers.target

- name: Enable AIDE daily timer
  systemd:
    name: aide-check.timer
    enabled: yes
    state: started
    daemon_reload: yes

- name: AIDE status
  debug:
    msg:
      - "✓ AIDE file integrity monitoring configured"
      - "  Database: /var/lib/aide/aide.db.gz"
      - "  Logs:     /var/log/aide/aide.log"
      - "  Timer:    daily (randomized +30min)"
      - "  IMPORTANT: Store a copy of aide.db.gz on read-only media or Btrfs RO snapshot"
      - "  Manual check: aide --check"

# ============================================

- name: Security stack complete
  debug:
    msg: "✓ Security stack configured (v5.2: nftables+egress-log + AppArmor + auditd CIS/STIG + AIDE)"

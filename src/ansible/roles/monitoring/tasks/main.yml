---
# Monitoring Role for Arch Linux v5.1
# Basic monitoring tools from official repos

- name: Install monitoring tools
  community.general.pacman:
    name:
      - htop
      - iotop
      - iftop
      - lsof
      - strace
      - sysstat
      - net-tools
      - bind-tools
    state: present

# Prometheus Node Exporter (official package)
- name: Install Prometheus Node Exporter
  community.general.pacman:
    name: prometheus-node-exporter
    state: present
  when: monitoring_node_exporter | default(false) | bool

- name: Enable Node Exporter service
  systemd:
    name: prometheus-node-exporter
    enabled: yes
    state: started
  when: monitoring_node_exporter | default(false) | bool

# Prometheus server (optional - from AUR)
- name: Check if Prometheus is requested
  when: monitoring_prometheus | default(false) | bool
  block:
    - name: Prometheus notice (AUR package)
      debug:
        msg:
          - "Prometheus is in AUR - install manually:"
          - "yay -S prometheus"
          - ""
          - "Or use Docker: podman run -d -p 9090:9090 prom/prometheus"
          - ""
          - "Configuration: /etc/prometheus/prometheus.yml"

    - name: Create Prometheus configuration directory
      file:
        path: /etc/prometheus
        state: directory
        mode: '0755'
        owner: root
        group: root

    - name: Deploy Prometheus configuration
      template:
        src: prometheus.yml.j2
        dest: /etc/prometheus/prometheus.yml
        mode: '0644'
        owner: root
        group: root

# Grafana (optional - from AUR)
- name: Check if Grafana is requested
  when: monitoring_grafana | default(false) | bool
  block:
    - name: Grafana notice (AUR package)
      debug:
        msg:
          - "Grafana is in AUR - install manually:"
          - "yay -S grafana"
          - ""
          - "Or use Docker: podman run -d -p 3000:3000 grafana/grafana"
          - ""
          - "Dashboard JSON: /etc/grafana/provisioning/dashboards/arch-server-dashboard.json"

    - name: Create Grafana dashboards directory
      file:
        path: /etc/grafana/provisioning/dashboards
        state: directory
        mode: '0755'
        owner: root
        group: root

    - name: Deploy Grafana dashboard
      copy:
        src: grafana-dashboard.json
        dest: /etc/grafana/provisioning/dashboards/arch-server-dashboard.json
        mode: '0644'
        owner: root
        group: root

# Basic monitoring dashboard (text-based)
- name: Create monitoring dashboard script
  copy:
    dest: /usr/local/bin/monitoring-dashboard
    mode: '0755'
    content: |
      #!/bin/bash
      # Simple monitoring dashboard for Arch Server v5.1

      echo "=========================================="
      echo "  ARCH SERVER v5.1 - MONITORING DASHBOARD"
      echo "=========================================="
      echo

      # System info
      echo "SYSTEM INFO:"
      echo "  Hostname: $(hostname)"
      echo "  Uptime:   $(uptime -p)"
      echo "  Load:     $(uptime | awk -F'load average:' '{print $2}' | xargs)"
      echo

      # CPU and Memory
      echo "RESOURCE USAGE:"
      echo "  CPU:      $(top -bn1 | grep "Cpu(s)" | sed "s/.*, *\([0-9.]*\)%* id.*/\1/" | awk '{print 100 - $1"%"}')"
      free -h | grep -E "^(Mem|Swap)" | awk '{print "  " $1 ":     " $3 "/" $2 " (" int($3/$2*100) "%)"}'
      echo

      # Disk usage
      echo "DISK USAGE:"
      df -h / | tail -1 | awk '{print "  Root:     " $3 "/" $2 " (" $5 " used)"}'
      echo

      # Services status
      echo "SERVICE STATUS:"
      for service in caddy sshd apparmor auditd; do
          if systemctl is-active $service &>/dev/null; then
              echo "  $service:    ✓ Running"
          else
              echo "  $service:    ✗ Stopped"
          fi
      done
      echo

      # Security status
      echo "SECURITY STATUS:"
      if [ -e /dev/tpm0 ] || [ -e /dev/tpmrm0 ]; then
          echo "  TPM:       ✓ Available"
      else
          echo "  TPM:       ✗ Not found"
      fi

      if mokutil --sb-state 2>/dev/null | grep -q "SecureBoot enabled"; then
          echo "  SecureBoot: ✓ Enabled"
      else
          echo "  SecureBoot: ✗ Disabled"
      fi

      if lsblk -o TYPE | grep -q "crypt"; then
          echo "  LUKS:      ✓ Active"
      else
          echo "  LUKS:      ✗ Not active"
      fi
      echo

      # Recent logs
      echo "RECENT LOGS (last 5 entries):"
      journalctl -n 5 --no-pager -q | head -5 | sed 's/^/  /'
      echo

      # Network info
      echo "NETWORK INFO:"
      ip route get 1.1.1.1 2>/dev/null | head -1 | awk '{print "  Gateway:  " $3}'
      echo "  DNS:      $(grep nameserver /etc/resolv.conf | head -1 | awk '{print $2}')"
      echo

# Fluent Bit is in AUR - provide notice
- name: Check if Fluent Bit is installed
  command: pacman -Q fluent-bit
  register: fluentbit_installed
  failed_when: false
  changed_when: false

- name: Fluent Bit notice
  debug:
    msg:
      - "Fluent Bit is NOT in official Arch repositories."
      - "To install from AUR: yay -S fluent-bit"
      - ""
      - "Alternative: Use journald for log aggregation"
      - "View logs: journalctl -f"
  when: fluentbit_installed.rc != 0

- name: Configure Fluent Bit (if installed)
  when: fluentbit_installed.rc == 0
  block:
    - name: Deploy Fluent Bit configuration
      copy:
        dest: /etc/fluent-bit/fluent-bit.conf
        mode: '0644'
        content: |
          [SERVICE]
              Flush        5
              Daemon       Off
              Log_Level    info
              
          [INPUT]
              Name systemd
              Tag  host.*
              Read_From_Tail On
              
          [FILTER]
              Name grep
              Match host.*
              Regex log (error|critical|alert|emergency|fail|denied)
              
          [OUTPUT]
              Name  stdout
              Match *
              Format json_lines

    - name: Enable Fluent Bit
      systemd:
        name: fluent-bit
        enabled: yes
        state: started

# Setup journald for efficient log storage
- name: Create journald conf directory
  file:
    path: /etc/systemd/journald.conf.d
    state: directory
    mode: '0755'

- name: Configure journald with Forward Secure Sealing (Tier 1)
  copy:
    dest: /etc/systemd/journald.conf.d/server.conf
    mode: '0644'
    content: |
      # journald configuration - Arch Server v5.2
      # FSS (Forward Secure Sealing) prevents retroactive log tampering.
      # Even with root access, sealed entries cannot be modified undetected.
      [Journal]
      # Persistent storage (survives reboots)
      Storage=persistent

      # Compression
      Compress=yes

      # Size limits
      SystemMaxUse=500M
      SystemMaxFileSize=50M
      RuntimeMaxUse=100M

      # Forward Secure Sealing: seal journal entries cryptographically
      # IMPORTANT: after deploy, run: journalctl --setup-keys
      # Store the verification key OFFLINE (print QR code or write down)
      # Verify integrity with: journalctl --verify --verify-key=<key>
      Seal=yes

      # Rate limiting (prevent log flooding from misbehaving services)
      RateLimitIntervalSec=30s
      RateLimitBurst=10000

      # No syslog forwarding (reduce attack surface)
      ForwardToSyslog=no
  notify: Restart journald

- name: Note about FSS key setup (manual step required)
  debug:
    msg:
      - "⚠ MANUAL STEP: Forward Secure Sealing enabled in journald config."
      - "After deployment, run: journalctl --setup-keys --interval=5min"
      - "CRITICAL: Store the verification key OFFLINE (print or write down)."
      - "Verify integrity anytime: journalctl --verify --verify-key=<your-key>"

- name: Enable sysstat collection
  systemd:
    name: sysstat
    enabled: yes
    state: started
  failed_when: false

# ============================================
# INCIDENT RESPONSE TRIAGE SCRIPT (Tier 3)
# ============================================

- name: Deploy IR triage script
  copy:
    dest: /usr/local/bin/ir-triage
    mode: '0750'
    content: |
      #!/bin/bash
      # Incident Response Triage Script - Arch Server v5.2
      # Captures forensic snapshot for security investigation
      # Usage: ir-triage [output-dir]
      set -euo pipefail

      OUTDIR="${1:-/var/log/ir-triage-$(date +%Y%m%d-%H%M%S)}"
      mkdir -p "$OUTDIR"
      chmod 700 "$OUTDIR"

      log() { echo "[$(date '+%H:%M:%S')] $*" | tee -a "$OUTDIR/triage.log"; }

      log "=== IR TRIAGE STARTED ($(hostname)) ==="
      log "Output: $OUTDIR"
      echo

      # ── Network state ─────────────────────────────────────────
      log "Capturing network state..."
      ss -tulpn > "$OUTDIR/network-listening.txt" 2>&1
      ss -tupn  > "$OUTDIR/network-connections.txt" 2>&1
      ip route show > "$OUTDIR/routes.txt" 2>&1
      ip addr show  > "$OUTDIR/interfaces.txt" 2>&1
      nft list ruleset > "$OUTDIR/nftables-ruleset.txt" 2>&1 || true

      # ── Process tree ──────────────────────────────────────────
      log "Capturing process tree..."
      ps auxf > "$OUTDIR/processes.txt" 2>&1
      ps -eo pid,ppid,user,lstart,cmd > "$OUTDIR/processes-detail.txt" 2>&1

      # ── Login history ─────────────────────────────────────────
      log "Capturing login history..."
      last -n 50 > "$OUTDIR/login-last.txt" 2>&1
      lastlog    > "$OUTDIR/login-lastlog.txt" 2>&1
      who        > "$OUTDIR/login-who.txt" 2>&1

      # ── Kernel modules ────────────────────────────────────────
      log "Capturing loaded kernel modules..."
      lsmod > "$OUTDIR/kernel-modules.txt" 2>&1

      # ── Scheduled tasks ───────────────────────────────────────
      log "Capturing scheduled tasks..."
      systemctl list-timers --all > "$OUTDIR/timers.txt" 2>&1
      crontab -l > "$OUTDIR/crontab-root.txt" 2>&1 || echo "(no root crontab)" > "$OUTDIR/crontab-root.txt"
      ls -la /etc/cron* > "$OUTDIR/cron-dirs.txt" 2>&1 || true

      # ── Audit summary ─────────────────────────────────────────
      log "Capturing audit events (last 200)..."
      ausearch -i --start today > "$OUTDIR/audit-today.txt" 2>&1 || \
        journalctl -k -n 200 > "$OUTDIR/audit-today.txt" 2>&1

      # ── Recent journal entries ────────────────────────────────
      log "Capturing recent journal (last 500 lines)..."
      journalctl -n 500 --no-pager > "$OUTDIR/journal-recent.txt" 2>&1

      # ── Failed services ───────────────────────────────────────
      log "Capturing failed services..."
      systemctl --failed > "$OUTDIR/failed-services.txt" 2>&1

      # ── Suspicious file activity (last 24h) ───────────────────
      log "Scanning for recently modified files in /etc /usr/bin /usr/lib..."
      find /etc /usr/bin /usr/sbin /usr/lib -newer /proc/1 -type f \
        2>/dev/null > "$OUTDIR/recently-modified.txt" || true

      # ── AIDE integrity check ──────────────────────────────────
      log "Running AIDE integrity check (may take a moment)..."
      aide --check > "$OUTDIR/aide-check.txt" 2>&1 || \
        echo "AIDE check failed or database not initialized" > "$OUTDIR/aide-check.txt"

      # ── Environment ───────────────────────────────────────────
      log "Capturing system info..."
      uname -a           > "$OUTDIR/uname.txt"
      uptime             >> "$OUTDIR/uname.txt"
      cat /etc/os-release >> "$OUTDIR/uname.txt"
      df -h              > "$OUTDIR/disk-usage.txt"
      free -h            > "$OUTDIR/memory.txt"

      # ── Summary ───────────────────────────────────────────────
      FILECOUNT=$(find "$OUTDIR" -type f | wc -l)
      log "=== TRIAGE COMPLETE: $FILECOUNT files in $OUTDIR ==="
      echo
      echo "Archive with: tar czf ir-triage.tar.gz -C $(dirname $OUTDIR) $(basename $OUTDIR)"

- name: Monitoring complete
  debug:
    msg: "✓ Monitoring configured (v5.2: +FSS sealing, +IR triage script at /usr/local/bin/ir-triage)"

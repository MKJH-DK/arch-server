---
# Base Hardening for Arch Linux v5.1
# Optimized for first-run success

- name: Update system packages
  community.general.pacman:
    update_cache: yes
    upgrade: yes

- name: Install essential security packages
  community.general.pacman:
    name:
      - nftables
      - apparmor
      - audit
      - rkhunter
      - lynis
      - git
      - base-devel
    state: present

# ============================================
# PARU AUR HELPER BOOTSTRAP
# ============================================

- name: Check if paru (AUR helper) is installed
  stat:
    path: /usr/bin/paru
  register: paru_stat

- name: Check if admin user home exists for paru bootstrap
  stat:
    path: "/home/{{ admin_user | default('admin') }}"
  register: admin_home_stat

# If the configured admin_user home doesn't exist, fall back to the first
# non-root member of the wheel group (i.e. whatever user install.sh created)
- name: Auto-detect wheel group member if admin home not found
  shell: |
    getent group wheel | cut -d: -f4 | tr ',' '\n' | grep -v '^root$' | grep -v '^$' | head -1
  register: detected_wheel_user
  changed_when: false
  failed_when: false
  when:
    - not paru_stat.stat.exists
    - not admin_home_stat.stat.exists

- name: Override admin_user with detected wheel member
  set_fact:
    admin_user: "{{ detected_wheel_user.stdout | trim }}"
  when:
    - detected_wheel_user is defined
    - detected_wheel_user.stdout is defined
    - detected_wheel_user.stdout | trim | length > 0

- name: Re-check admin user home after auto-detection
  stat:
    path: "/home/{{ admin_user }}"
  register: admin_home_stat
  when:
    - detected_wheel_user is defined
    - detected_wheel_user.stdout is defined
    - detected_wheel_user.stdout | trim | length > 0

- name: Bootstrap paru-bin from AUR (no Rust required, runs as admin user)
  become: yes
  become_user: "{{ admin_user | default('admin') }}"
  environment:
    HOME: "/home/{{ admin_user | default('admin') }}"
  shell: |
    set -e
    TMPDIR=$(mktemp -d /tmp/paru-bootstrap.XXXXXX)
    trap "rm -rf $TMPDIR" EXIT
    git clone https://aur.archlinux.org/paru-bin.git "$TMPDIR"
    cd "$TMPDIR"
    makepkg -si --noconfirm --needed
  when:
    - not paru_stat.stat.exists
    - admin_home_stat.stat.exists
  register: paru_bootstrap
  failed_when: false

- name: Paru bootstrap status
  debug:
    msg: >-
      {{
        '✓ paru AUR helper installed' if (paru_bootstrap.rc is defined and paru_bootstrap.rc == 0)
        else ('✓ paru already installed' if paru_stat.stat.exists
        else '⚠ paru bootstrap failed — AUR packages will not auto-install')
      }}

# ============================================

- name: Check if linux-hardened is installed
  command: pacman -Q linux-hardened
  register: hardened_check
  failed_when: false
  changed_when: false

- name: Note about hardened kernel
  debug:
    msg: "linux-hardened kernel is {{ 'installed' if hardened_check.rc == 0 else 'NOT installed (using default kernel)' }}"

- name: Configure sysctl hardening
  sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    state: present
    reload: yes
    ignoreerrors: yes
  loop:
    # Kernel pointer restriction
    - { key: "kernel.kptr_restrict", value: "2" }
    # Restrict dmesg
    - { key: "kernel.dmesg_restrict", value: "1" }
    # Disable unprivileged BPF
    - { key: "kernel.unprivileged_bpf_disabled", value: "1" }
    # Harden BPF JIT
    - { key: "net.core.bpf_jit_harden", value: "2" }
    # Restrict ptrace
    - { key: "kernel.yama.ptrace_scope", value: "2" }
    # Network hardening
    - { key: "net.ipv4.conf.all.rp_filter", value: "1" }
    - { key: "net.ipv4.conf.default.rp_filter", value: "1" }
    - { key: "net.ipv4.conf.all.accept_redirects", value: "0" }
    - { key: "net.ipv4.conf.default.accept_redirects", value: "0" }
    - { key: "net.ipv6.conf.all.accept_redirects", value: "0" }
    - { key: "net.ipv6.conf.default.accept_redirects", value: "0" }
    - { key: "net.ipv4.conf.all.send_redirects", value: "0" }
    - { key: "net.ipv4.conf.default.send_redirects", value: "0" }
    - { key: "net.ipv4.tcp_syncookies", value: "1" }
    - { key: "net.ipv4.tcp_rfc1337", value: "1" }
    # Filesystem protection
    - { key: "fs.protected_symlinks", value: "1" }
    - { key: "fs.protected_hardlinks", value: "1" }
    - { key: "fs.protected_fifos", value: "2" }
    - { key: "fs.protected_regular", value: "2" }
    - { key: "fs.suid_dumpable", value: "0" }

- name: Check if SSH service exists
  stat:
    path: /etc/ssh/sshd_config
  register: sshd_config

- name: Harden SSH configuration
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    create: no
  loop:
    - { regexp: '^#?PermitRootLogin', line: 'PermitRootLogin prohibit-password' }
    - { regexp: '^#?MaxAuthTries', line: 'MaxAuthTries 3' }
    - { regexp: '^#?X11Forwarding', line: 'X11Forwarding no' }
    - { regexp: '^#?AllowTcpForwarding', line: 'AllowTcpForwarding no' }
    - { regexp: '^#?ClientAliveCountMax', line: 'ClientAliveCountMax 2' }
  when: sshd_config.stat.exists
  notify: Restart sshd

- name: Check if SSH authorized_keys exists
  stat:
    path: /home/{{ admin_user | default('admin') }}/.ssh/authorized_keys
  register: ssh_keys_installed

- name: Configure password authentication based on SSH keys
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PasswordAuthentication'
    line: "PasswordAuthentication {{ 'no' if ssh_keys_installed.stat.exists else 'yes' }}"
  when: sshd_config.stat.exists
  notify: Restart sshd

- name: Enable PubkeyAuthentication
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PubkeyAuthentication'
    line: 'PubkeyAuthentication yes'
  when: sshd_config.stat.exists
  notify: Restart sshd

- name: SSH key auth status
  debug:
    msg: "SSH key authentication: {{ 'ENABLED (password disabled)' if ssh_keys_installed.stat.exists else 'NOT CONFIGURED (password enabled)' }}"

- name: Disable unused kernel modules
  copy:
    dest: /etc/modprobe.d/blacklist-security.conf
    mode: '0644'
    content: |
      # Security blacklist - disable unused/dangerous protocols
      # Arch Linux v5.1
      
      # Disable unused network protocols
      install dccp /bin/false
      install sctp /bin/false
      install rds /bin/false
      install tipc /bin/false
      
      # Disable unused filesystems
      install cramfs /bin/false
      install freevxfs /bin/false
      install jffs2 /bin/false
      install hfs /bin/false
      install hfsplus /bin/false
      install udf /bin/false
      
      # Disable firewire (DMA attack vector)
      install firewire-core /bin/false
      install firewire-ohci /bin/false
      install firewire-sbp2 /bin/false

- name: Create security limits directory
  file:
    path: /etc/security/limits.d
    state: directory
    mode: '0755'

- name: Restrict core dumps
  copy:
    dest: /etc/security/limits.d/core.conf
    mode: '0644'
    content: |
      * hard core 0
      * soft core 0

- name: Disable core dumps via sysctl
  sysctl:
    name: kernel.core_pattern
    value: "|/bin/false"
    state: present
    reload: yes
    ignoreerrors: yes

- name: Install health check script
  copy:
    src: health-check
    dest: /usr/local/bin/health-check
    mode: '0755'

# ============================================
# ASLR ENTROPY BOOST
# ============================================

- name: Increase mmap ASLR entropy (Tier 1)
  sysctl:
    name: vm.mmap_rnd_bits
    value: "32"
    state: present
    reload: yes
    ignoreerrors: yes

# ============================================
# DNS-OVER-TLS via systemd-resolved (Tier 1)
# ============================================

- name: Create systemd-resolved config directory
  file:
    path: /etc/systemd/resolved.conf.d
    state: directory
    mode: '0755'

- name: Configure DNS-over-TLS with DNSSEC (disable LLMNR/mDNS)
  copy:
    dest: /etc/systemd/resolved.conf.d/dns-tls.conf
    mode: '0644'
    content: |
      # DNS-over-TLS - Arch Server v5.2
      # Encrypts DNS queries; disables LLMNR/mDNS (common lateral-movement vectors)
      [Resolve]
      DNS=1.1.1.1#cloudflare-dns.com 1.0.0.1#cloudflare-dns.com
      FallbackDNS=9.9.9.9#dns.quad9.net 149.112.112.112#dns.quad9.net
      DNSOverTLS=yes
      DNSSEC=yes
      LLMNR=no
      MulticastDNS=no
  notify: Restart systemd-resolved

- name: Enable systemd-resolved
  systemd:
    name: systemd-resolved
    enabled: yes
    state: started

- name: Point /etc/resolv.conf to systemd-resolved stub resolver
  file:
    src: /run/systemd/resolve/stub-resolv.conf
    dest: /etc/resolv.conf
    state: link
    force: yes

# ============================================
# ARCH-AUDIT VULNERABILITY SCANNER (Tier 2)
# ============================================

- name: Install arch-audit
  community.general.pacman:
    name: arch-audit
    state: present

- name: Deploy arch-audit systemd service unit
  copy:
    dest: /etc/systemd/system/arch-audit.service
    mode: '0644'
    content: |
      [Unit]
      Description=Arch Linux Package Vulnerability Audit
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=oneshot
      ExecStart=/usr/bin/arch-audit --quiet
      StandardOutput=journal
      StandardError=journal

- name: Deploy arch-audit systemd timer (weekly)
  copy:
    dest: /etc/systemd/system/arch-audit.timer
    mode: '0644'
    content: |
      [Unit]
      Description=Weekly Arch Linux Package Vulnerability Audit

      [Timer]
      OnCalendar=weekly
      Persistent=true
      RandomizedDelaySec=1h

      [Install]
      WantedBy=timers.target

- name: Enable arch-audit weekly timer
  systemd:
    name: arch-audit.timer
    enabled: yes
    state: started
    daemon_reload: yes

# ============================================
# WIFI AUTO-DISABLE + PMF (Tier 2)
# ============================================

- name: Check if NetworkManager is installed
  command: pacman -Q networkmanager
  register: nm_check
  failed_when: false
  changed_when: false

- name: Create NetworkManager dispatcher directory
  file:
    path: /etc/NetworkManager/dispatcher.d
    state: directory
    mode: '0755'
  when: nm_check.rc == 0

- name: Deploy WiFi auto-disable dispatcher script
  copy:
    dest: /etc/NetworkManager/dispatcher.d/99-wifi-disable
    mode: '0755'
    content: |
      #!/bin/bash
      # Auto-disable WiFi when Ethernet is connected (Arch Server v5.2)
      # Reduces attack surface: only one active network interface at a time
      IFACE="$1"
      ACTION="$2"

      # Only act on Ethernet/wired interfaces
      [[ "$IFACE" =~ ^(eth|en) ]] || exit 0

      case "$ACTION" in
        up)
          nmcli radio wifi off
          logger -t arch-server "WiFi disabled: Ethernet $IFACE connected"
          ;;
        down)
          nmcli radio wifi on
          logger -t arch-server "WiFi enabled: Ethernet $IFACE disconnected"
          ;;
      esac
  when: nm_check.rc == 0

- name: Note about WiFi PMF (Protected Management Frames)
  debug:
    msg:
      - "WiFi PMF (ieee80211w=2): set manually per connection:"
      - "  nmcli connection modify <SSID> 802-11-wireless-security.pmf 3"
      - "This cryptographically protects against deauth attacks."
  when: nm_check.rc == 0

# ============================================
# LINUX-HARDENED KERNEL (Tier 3, opt-in)
# ============================================

- name: Install linux-hardened kernel (optional)
  community.general.pacman:
    name:
      - linux-hardened
      - linux-hardened-headers
    state: present
  when: install_hardened_kernel | default(false) | bool
  notify: Regenerate initramfs

- name: Note about linux-hardened kernel
  debug:
    msg:
      - "linux-hardened kernel: NOT installed (standard kernel active)"
      - "To enable: set 'install_hardened_kernel: true' in playbook vars"
      - "Benefits: more ASLR entropy, init_on_alloc/free, no kexec, restricted pointers"
      - "Standard kernel is kept as fallback boot entry automatically"
  when: not (install_hardened_kernel | default(false) | bool)

# ============================================

- name: Base hardening complete
  debug:
    msg: "✓ Base hardening applied (v5.2: +DoT, +arch-audit, +WiFi dispatcher, +ASLR)"

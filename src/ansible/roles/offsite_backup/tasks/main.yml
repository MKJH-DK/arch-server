---
# Offsite Backup Role - Arch Server v5.2
# Tier 2: Encrypted offsite backups with Restic
# Supports: Backblaze B2, S3-compatible storage, SFTP, local

# ============================================
# INSTALL RESTIC
# ============================================

- name: Install restic backup tool
  community.general.pacman:
    name: restic
    state: present

# ============================================
# CONFIGURATION DIRECTORIES
# ============================================

- name: Create restic configuration directory
  file:
    path: /etc/restic
    state: directory
    mode: '0700'
    owner: root
    group: root

- name: Create restic log directory
  file:
    path: /var/log/restic
    state: directory
    mode: '0700'
    owner: root
    group: root

# ============================================
# BACKUP CONFIGURATION TEMPLATE
# ============================================

- name: Deploy restic environment template
  copy:
    dest: /etc/restic/env.conf.example
    mode: '0600'
    force: no
    content: |
      # Restic backup environment - Arch Server v5.2
      # Copy this file to /etc/restic/env.conf and fill in your credentials.
      # Then encrypt the password with:
      #   echo -n 'your-restic-password' | store-credential restic-password
      # And reference it in the service unit below.
      #
      # NEVER commit this file to git (it's in .gitignore).

      # ── Backblaze B2 example ──────────────────────────────────
      # RESTIC_REPOSITORY=b2:your-bucket-name:/arch-server
      # B2_ACCOUNT_ID=your-application-key-id
      # B2_ACCOUNT_KEY=your-application-key

      # ── S3-compatible (Cloudflare R2, Minio, etc.) ────────────
      # RESTIC_REPOSITORY=s3:https://your-endpoint/your-bucket
      # AWS_ACCESS_KEY_ID=your-key-id
      # AWS_SECRET_ACCESS_KEY=your-secret-key

      # ── SFTP example ──────────────────────────────────────────
      # RESTIC_REPOSITORY=sftp:user@remote-host:/backups/arch-server

      # ── Repository password (set here OR use systemd-creds) ───
      # RESTIC_PASSWORD=your-strong-passphrase
      # (prefer systemd-creds: store-credential restic-password)

- name: Check if restic env config exists
  stat:
    path: /etc/restic/env.conf
  register: restic_env

- name: Note about restic configuration (not yet configured)
  debug:
    msg:
      - "⚠ Restic backup NOT yet configured (no /etc/restic/env.conf)."
      - "To configure:"
      - "  1. cp /etc/restic/env.conf.example /etc/restic/env.conf"
      - "  2. Edit /etc/restic/env.conf with your backend credentials"
      - "  3. Encrypt the repo password: echo -n 'passphrase' | store-credential restic-password"
      - "  4. Initialize repo: source /etc/restic/env.conf && restic init"
      - "  5. Start timer: systemctl start restic-backup.timer"
  when: not restic_env.stat.exists

# ============================================
# BACKUP SCRIPT
# ============================================

- name: Deploy restic backup script
  copy:
    dest: /usr/local/bin/restic-backup
    mode: '0750'
    content: |
      #!/bin/bash
      # Restic backup script - Arch Server v5.2
      # Runs via systemd timer. Uses environment from /etc/restic/env.conf
      set -euo pipefail

      ENV_FILE="/etc/restic/env.conf"
      LOG_FILE="/var/log/restic/backup.log"

      log() { echo "[$(date '+%Y-%m-%d %H:%M:%S')] $*" | tee -a "$LOG_FILE"; }

      # Load environment (RESTIC_REPOSITORY, credentials, etc.)
      if [[ -f "$ENV_FILE" ]]; then
        # shellcheck source=/dev/null
        source "$ENV_FILE"
      elif [[ -n "${CREDENTIALS_DIRECTORY:-}" && -f "${CREDENTIALS_DIRECTORY}/restic-password" ]]; then
        # systemd-creds: password injected via LoadCredentialEncrypted
        export RESTIC_PASSWORD
        RESTIC_PASSWORD="$(cat "${CREDENTIALS_DIRECTORY}/restic-password")"
      else
        log "ERROR: /etc/restic/env.conf not found and no systemd credentials available."
        log "Run: store-credential restic-password (then enable restic-backup.service credential)"
        exit 1
      fi

      if [[ -z "${RESTIC_REPOSITORY:-}" ]]; then
        log "ERROR: RESTIC_REPOSITORY not set in /etc/restic/env.conf"
        exit 1
      fi

      log "=== Restic backup started ==="
      log "Repository: ${RESTIC_REPOSITORY}"

      # ── Create snapshot ───────────────────────────────────────
      restic backup \
        --exclude=/proc \
        --exclude=/sys \
        --exclude=/dev \
        --exclude=/run \
        --exclude=/tmp \
        --exclude=/var/tmp \
        --exclude=/var/cache \
        --exclude=/var/lib/containers/storage \
        --exclude=/home/*/.cache \
        --tag "arch-server" \
        --tag "$(hostname)" \
        / 2>&1 | tee -a "$LOG_FILE"

      # ── Forget old snapshots (retention policy) ───────────────
      restic forget \
        --keep-daily 7 \
        --keep-weekly 4 \
        --keep-monthly 6 \
        --prune \
        2>&1 | tee -a "$LOG_FILE"

      log "=== Restic backup complete ==="

      # ── Check repository health ───────────────────────────────
      restic check 2>&1 | tee -a "$LOG_FILE"

# ============================================
# SYSTEMD SERVICE + TIMER
# ============================================

- name: Deploy restic backup systemd service
  copy:
    dest: /etc/systemd/system/restic-backup.service
    mode: '0644'
    content: |
      [Unit]
      Description=Restic Encrypted Offsite Backup
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=oneshot
      ExecStart=/usr/local/bin/restic-backup
      StandardOutput=journal
      StandardError=journal

      # Hardening
      ProtectSystem=strict
      ReadWritePaths=/var/log/restic
      PrivateTmp=yes
      NoNewPrivileges=yes
      ProtectKernelTunables=yes
      ProtectKernelModules=yes

      # Inject restic password from encrypted credential (if configured)
      # To enable: store-credential restic-password
      # Then uncomment:
      # LoadCredentialEncrypted=restic-password:/etc/credstore.encrypted/restic-password.cred

- name: Deploy restic backup systemd timer (daily at 03:00)
  copy:
    dest: /etc/systemd/system/restic-backup.timer
    mode: '0644'
    content: |
      [Unit]
      Description=Daily Restic Encrypted Offsite Backup

      [Timer]
      OnCalendar=*-*-* 03:00:00
      Persistent=true
      RandomizedDelaySec=30min

      [Install]
      WantedBy=timers.target

- name: Reload systemd after new unit files
  systemd:
    daemon_reload: yes

- name: Enable restic backup timer (starts when env.conf exists)
  systemd:
    name: restic-backup.timer
    enabled: yes
    state: "{{ 'started' if restic_env.stat.exists else 'stopped' }}"
  failed_when: false

- name: Offsite backup complete
  debug:
    msg:
      - "✓ Restic offsite backup role deployed (v5.2)"
      - "  Status: {{ 'ACTIVE (env.conf found)' if restic_env.stat.exists else 'WAITING for /etc/restic/env.conf' }}"
      - "  Script: /usr/local/bin/restic-backup"
      - "  Timer:  daily at 03:00 (restic-backup.timer)"
      - "  Logs:   /var/log/restic/backup.log"
      - ""
      - "  Setup guide: /etc/restic/env.conf.example"
      - "  Manual run:  systemctl start restic-backup.service"
